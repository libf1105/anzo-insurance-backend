# ============================
# 服务器配置
# ============================
server.port=8080
server.servlet.context-path=/api

# ============================
# 数据库配置
# ============================
spring.datasource.url=jdbc:mysql://192.168.3.183:3306/anzo_insurance_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================
# MyBatis-Plus配置
# ============================
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.cache-enabled=true

# ============================
# JWT配置
# ============================
jwt.secret-key=anzo-insurance-secret-key-2024-january-super-secure-jwt-key-for-authentication
# 24小时（毫秒）
jwt.expiration-time=86400000
# 7天（毫秒）
jwt.refresh-expiration-time=604800000

# ============================
# Redis配置
# ============================
spring.redis.host=192.168.3.183
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=3000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=10
spring.redis.lettuce.pool.min-idle=5
spring.redis.lettuce.pool.max-wait=3000
# Redis 配置模板，按需取消注释
# spring.redis.host=127.0.0.1
# spring.redis.port=6379
# spring.redis.password=your-redis-password
# spring.redis.database=0
# spring.redis.timeout=3000ms
# spring.redis.lettuce.pool.max-active=20
# spring.redis.lettuce.pool.max-idle=10
# spring.redis.lettuce.pool.min-idle=5
# spring.redis.lettuce.pool.max-wait=3000ms

# ============================
# Elasticsearch配置
# ============================
# spring.elasticsearch.uris=http://localhost:9200
# spring.elasticsearch.username=
# spring.elasticsearch.password=
# spring.elasticsearch.connection-timeout=3s
# spring.elasticsearch.socket-timeout=10s
# Elasticsearch 配置模板，按需取消注释
# spring.elasticsearch.uris=http://127.0.0.1:9200
# spring.elasticsearch.username=elastic
# spring.elasticsearch.password=your-es-password
# spring.elasticsearch.connection-timeout=3s
# spring.elasticsearch.socket-timeout=10s
# Elasticsearch 集群模板，按需取消注释
# spring.elasticsearch.uris=http://127.0.0.1:9200,http://127.0.0.1:9201

# ============================
# 文件上传配置
# ============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# 邮件配置
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# ============================
# 日志配置
# ============================
logging.level.com.anzo.insurance=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.mybatis=DEBUG
logging.file.name=logs/anzo-insurance.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================
# 应用配置
# ============================
spring.application.name=anzo-insurance-backend

# 时区配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# 缓存配置
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterAccess=600s

# ============================
# Swagger配置
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.version=v1.0.0
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# ============================
# 跨域配置（开发环境）
# ============================
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,X-Enterprise-Id,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
cors.exposed-headers=Authorization,Content-Disposition,X-Enterprise-Id
cors.max-age=3600

# ============================
# 安全配置
# ============================
# 密码加密强度
spring.security.bcrypt.strength=10

# ============================
# 业务配置
# ============================
# 文件存储路径
file.upload.dir=uploads/
# 10MB
file.max-size=10485760

# MinIO 文件存储配置
app.file.storage.minio.endpoint=http://192.168.3.183:9000
app.file.storage.minio.access-key=admin
app.file.storage.minio.secret-key=admin@1234
app.file.storage.minio.bucket.enterprise=anzotech

# 验证码配置
# 5分钟
verification.code.expire-time=300
# 60秒后才能重发
verification.code.resend-interval=60

# 注册审核配置
# 是否自动审核（开发环境可设为true）
enterprise.review.auto-approve=false
# 审核超时天数
enterprise.review.timeout-days=7

# 保单配置
policy.default-currency=CNY
# 最大投保金额（1亿）
policy.max-application-amount=100000000
# 默认加成比例
policy.default-addition-ratio=1.10

# ============================
# 监控配置
# ============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
