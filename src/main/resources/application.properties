# ============================
# 应用基础配置
# ============================
spring.application.name=anzo-insurance-backend
spring.profiles.active=dev

# ============================
# 服务器配置
# ============================
server.port=8080
server.servlet.context-path=/api
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================
# 日志配置
# ============================
logging.level.root=INFO
logging.level.com.anzo.insurance=DEBUG
logging.file.name=logs/anzo-insurance.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================
# 时区配置
# ============================
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ============================
# 文件上传配置
# ============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# 配置说明
# ============================
# 开发环境配置请查看 application-dev.properties
# 生产环境配置请查看 application-prod.properties
# 测试环境配置请查看 application-test.properties
#
# Redis / Elasticsearch 配置模板请查看：
# - application.yml
# - application-dev.yml
# - application-dev.properties
#
# 如需直接在 properties 中启用，可参考以下模板并手动取消注释：
#
# Redis
# spring.redis.host=127.0.0.1
# spring.redis.port=6379
# spring.redis.password=your-redis-password
# spring.redis.database=0
# spring.redis.timeout=3000ms
#
# Elasticsearch
# spring.elasticsearch.uris=http://127.0.0.1:9200
# spring.elasticsearch.username=elastic
# spring.elasticsearch.password=your-es-password
# spring.elasticsearch.connection-timeout=3s
# spring.elasticsearch.socket-timeout=10s
