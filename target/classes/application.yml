server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: anzo-insurance-system
    
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:anzo_insurance}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  # Redis 配置模板，按需取消注释后使用
  # redis:
  #   host: 127.0.0.1
  #   port: 6379
  #   password: your-redis-password
  #   database: 0
  #   timeout: 3000ms
  #   lettuce:
  #     pool:
  #       max-active: 20
  #       max-idle: 10
  #       min-idle: 5
  #       max-wait: 3000ms

  # Elasticsearch配置
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    connection-timeout: 3s
    socket-timeout: 10s
  # Elasticsearch 配置模板，按需取消注释后使用
  # elasticsearch:
  #   uris: http://127.0.0.1:9200
  #   username: elastic
  #   password: your-es-password
  #   connection-timeout: 3s
  #   socket-timeout: 10s
  # 集群示例
  # elasticsearch:
  #   uris: http://127.0.0.1:9200,http://127.0.0.1:9201
  #   username: elastic
  #   password: your-es-password
        
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
      
  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.anzo.insurance.modules.**.entity
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 应用自定义配置
app:
  # JWT配置
  jwt:
    secret: ${JWT_SECRET:anzo-insurance-secret-key-change-in-production}
    expiration: 7200000  # 2小时
    refresh-expiration: 604800000  # 7天
    
  # 文件存储配置
  file:
    storage:
      type: ${STORAGE_TYPE:minio}  # minio/oss
      minio:
        endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin}
        bucket:
          enterprise: enterprise-files
          insurance: insurance-files
          claim: claim-files
      oss:
        endpoint: ${OSS_ENDPOINT:}
        access-key-id: ${OSS_ACCESS_KEY_ID:}
        access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
        bucket: anzo-insurance
        
  # 保司API配置
  insurer:
    api:
      timeout: 30000
      retry-count: 3
      
  # 风控配置
  risk:
    max-policy-amount: 5000000  # 单笔投保最高500万
    daily-max-applications: 100  # 每日最多投保笔数
    
  # 系统配置
  system:
    batch-size: 50  # 批量处理大小
    export-max-rows: 10000  # 导出最大行数

# 日志配置
logging:
  level:
    com.anzo.insurance: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/anzo-insurance.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
